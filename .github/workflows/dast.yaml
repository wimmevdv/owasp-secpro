name: DAST
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 3 * * 4'   # elke donderdag 03:00 UTC
jobs:
  zap:
    name: OWASP ZAP DAST scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Juice-Shop
        run: |
          docker run -d --name juiceshop -p 3000:3000 bkimminich/juice-shop
          echo "Wachten tot Juice-Shop bereikbaar is..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Juice-Shop is up."
              exit 0
            fi
            sleep 5
          done
          echo "Juice-Shop is niet opgestart binnen de tijdslimiet."
          exit 1

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: true          # laat de pipeline falen op gevonden issues
          allow_issue_writing: false
          cmd_options: '-a'
