name: SCA
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 3 * * 2'   # elke dinsdag 03:00 UTC
jobs:
  trivy:
    name: Trivy SCA scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy dependency (SCA) scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: 1          # laat de pipeline falen op gevonden kwetsbaarheden
          ignore-unfixed: false
          format: table
