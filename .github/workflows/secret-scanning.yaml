name: Secret Scanning
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 3 * * 3'   # elke woensdag 03:00 UTC
jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # volledige history scannen, niet alleen laatste commit

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
        # gitleaks-action faalt de job automatisch (exit-code 1)
        # zodra er een secret wordt gevonden -> pipeline blokkeert
